<form action="#" method="post">
    <p>
        <label for="name">Enter your Name:</label><br>
        <input type="text" id="name" name="name">
    </p>

    <p>
        <label for="email">E-mail address*:</label><br>
        <input type="email" id="email" name="email" required>
    </p>

    <p>
        <label for="subject">Message Subject:</label><br>
        <input type="text" id="subject" name="subject">
    </p>

    <p>
        <label for="message">Enter your Message*:</label><br>
        <textarea id="message" name="message" rows="10" cols="40" required></textarea>
    </p>

    <p>
        <input type="checkbox" id="copy" name="copy">
        <label for="copy">E-mail a copy of this message to your own address.</label>
    </p>

    <button type="submit" style="background-color: green; color: white; padding: 5px 15px; border: none; cursor: pointer;">
        Send
    </button>
</form>
